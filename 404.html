<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForgeX — 404</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-deep:#05050A;--bg-card:#0D0D16;--bg-raised:#111120;
      --border-dim:rgba(255,255,255,0.04);--border-soft:rgba(255,255,255,0.08);
      --crimson:#E8192C;--crimson-light:#FF3D52;--crimson-dim:rgba(232,25,44,0.18);--crimson-glow:rgba(232,25,44,0.40);
      --magenta:#C026D3;--magenta-light:#D946EF;--magenta-glow:rgba(192,38,211,0.35);
      --led-mid:#E879F9;--led-mid-glow:rgba(232,121,249,0.25);
      --text-primary:#F2F0F8;--text-secondary:#8B8A9E;--text-muted:#4A4A62;
      --font-display:'Bebas Neue',sans-serif;--font-body:'Barlow',sans-serif;
      --font-cond:'Barlow Condensed',sans-serif;--font-mono:'DM Mono',monospace;
    }
    html,body{height:100%;overflow:hidden}
    body{
      background:var(--bg-deep);color:var(--text-primary);
      font-family:var(--font-body);-webkit-font-smoothing:antialiased;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      position:relative;
    }

    /* ── GRILLE EN FOND ── */
    body::before{
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(232,25,44,0.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(232,25,44,0.025) 1px,transparent 1px);
      background-size:44px 44px;pointer-events:none;
    }

    /* ── AURAS ── */
    .aura{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px)}
    .aura-1{width:500px;height:500px;background:radial-gradient(circle,rgba(232,25,44,0.08),transparent 70%);top:-120px;left:-100px}
    .aura-2{width:400px;height:400px;background:radial-gradient(circle,rgba(192,38,211,0.07),transparent 70%);bottom:-80px;right:-80px}

    /* ── LED TOP ── */
    .led-top{
      position:fixed;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--crimson) 20%,var(--led-mid) 50%,var(--magenta) 80%,transparent);
      box-shadow:0 0 10px var(--crimson-glow),0 0 30px var(--magenta-glow);
    }

    /* ── CONTENU ── */
    .container{
      position:relative;z-index:2;
      text-align:center;
      padding:40px 24px;
      max-width:640px;
      animation:fadeIn 0.6s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    /* Grand 404 */
    .big-404{
      font-family:var(--font-display);
      font-size:clamp(120px,22vw,220px);
      line-height:0.85;
      letter-spacing:8px;
      color:transparent;
      -webkit-text-stroke:2px rgba(232,25,44,0.25);
      position:relative;
      margin-bottom:8px;
      user-select:none;
    }
    .big-404::after{
      content:'404';
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      letter-spacing:8px;
      background:linear-gradient(135deg,var(--crimson) 0%,var(--led-mid) 50%,var(--magenta-light) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:blur(0);
      text-shadow:none;
      animation:glitch 4s ease-in-out infinite;
    }
    @keyframes glitch{
      0%,90%,100%{clip-path:none;transform:none}
      91%{clip-path:inset(20% 0 60% 0);transform:translateX(-4px)}
      92%{clip-path:inset(60% 0 10% 0);transform:translateX(4px)}
      93%{clip-path:inset(40% 0 30% 0);transform:translateX(-2px)}
      94%{clip-path:none;transform:none}
    }

    /* Badge erreur */
    .err-badge{
      font-family:var(--font-mono);font-size:10px;letter-spacing:3px;
      text-transform:uppercase;color:var(--crimson-light);
      border:1px solid var(--crimson-dim);
      padding:5px 14px;display:inline-block;margin-bottom:20px;
      background:rgba(232,25,44,0.06);
    }

    /* Titre */
    .err-title{
      font-family:var(--font-display);
      font-size:clamp(32px,6vw,52px);
      letter-spacing:3px;line-height:0.9;
      color:var(--text-primary);margin-bottom:16px;
    }
    .err-title span{color:var(--crimson);text-shadow:0 0 20px var(--crimson-glow)}

    /* Description */
    .err-desc{
      font-size:15px;font-weight:300;color:var(--text-secondary);
      line-height:1.75;margin-bottom:36px;max-width:460px;margin-left:auto;margin-right:auto;
    }

    /* Boutons */
    .err-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
    .btn-home{
      font-family:var(--font-cond);font-size:13px;font-weight:700;
      letter-spacing:2.5px;text-transform:uppercase;
      background:var(--crimson);color:#fff;border:none;
      padding:14px 32px;cursor:pointer;text-decoration:none;
      box-shadow:0 0 20px var(--crimson-glow);transition:all 0.22s;display:inline-block;
    }
    .btn-home:hover{background:var(--crimson-light);box-shadow:0 0 32px var(--crimson-glow);transform:translateY(-1px)}
    .btn-back{
      font-family:var(--font-cond);font-size:13px;font-weight:700;
      letter-spacing:2.5px;text-transform:uppercase;
      background:transparent;color:var(--text-muted);
      border:1px solid var(--border-soft);
      padding:14px 32px;cursor:pointer;text-decoration:none;
      transition:all 0.22s;display:inline-block;
    }
    .btn-back:hover{border-color:var(--magenta);color:var(--magenta-light)}

    /* Liens rapides */
    .quick-links{
      display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
    }
    .quick-link{
      font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;
      color:var(--text-muted);text-decoration:none;
      padding:6px 14px;border:1px solid var(--border-dim);background:var(--bg-card);
      transition:all 0.2s;
    }
    .quick-link:hover{border-color:var(--crimson);color:var(--crimson-light)}

    /* Compte à rebours */
    .auto-redirect{
      font-family:var(--font-mono);font-size:10px;letter-spacing:1.5px;
      color:var(--text-muted);margin-top:28px;
    }
    .auto-redirect span{color:var(--crimson-light);font-weight:700}

    @media(max-width:480px){
      .big-404{letter-spacing:4px}
      .err-actions{flex-direction:column;align-items:center}
      .btn-home,.btn-back{width:100%;text-align:center}
    }
  </style>
</head>
<body>

<div class="led-top"></div>
<div class="aura aura-1"></div>
<div class="aura aura-2"></div>

<div class="container">
  <div class="big-404">404</div>

  <div class="err-badge">ERR_PAGE_NOT_FOUND</div>

  <h1 class="err-title">PAGE<br><span>INTROUVABLE</span></h1>

  <p class="err-desc">
    Cette page n'existe pas ou a été déplacée.<br>
    Retourne à l'accueil et forge ton corps.
  </p>

  <div class="err-actions">
    <a class="btn-home" href="index.html">← Retour à l'accueil</a>
    <a class="btn-back" href="javascript:history.back()">Page précédente</a>
  </div>

  <div class="quick-links">
    <a class="quick-link" href="entrainements.html">🏋️ Entraînements</a>
    <a class="quick-link" href="nutrition.html">🥗 Nutrition</a>
    <a class="quick-link" href="coaches.html">🤖 Coaches</a>
    <a class="quick-link" href="communaute.html">💬 Communauté</a>
    <a class="quick-link" href="dashboard.html">👤 Mon espace</a>
  </div>

  <div class="auto-redirect">
    Redirection automatique dans <span id="countdown">10</span>s
  </div>
</div>

<script>
  /* Compte à rebours + redirection */
  let n = 10;
  const el = document.getElementById('countdown');
  const timer = setInterval(function(){
    n--;
    el.textContent = n;
    if(n <= 0){
      clearInterval(timer);
      window.location.href = 'index.html';
    }
  }, 1000);

  /* Annuler si l'utilisateur interagit */
  document.addEventListener('click', function(){ clearInterval(timer); document.querySelector('.auto-redirect').style.display='none'; });
  document.addEventListener('keydown', function(){ clearInterval(timer); document.querySelector('.auto-redirect').style.display='none'; });
</script>
</body>
</html>
